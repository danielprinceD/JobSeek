server:
    port: 8080

spring:
  application:
    name: JobSeek

  datasource:
    url: jdbc:mysql://localhost:3307/jobseek
    username: root
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true